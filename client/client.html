<!DOCTYPE html>
<html>

<head>
    <title>Math Client</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <h1>Math Services Client</h1>

    <h3>Número pi</h3>
    <input type="button" value="Submit" onclick="loadPi()">
    <div id="pirespmsg"></div>

    <h3>Secuencia de Pell</h3>
    <label>Número:</label>
    <input type="text" id="pellnum" name="pellnum" value="10">
    <input type="button" value="Submit" onclick="loadPellSeq()">
    <div id="pellseqrespmsg"></div>

    <script>
        const PROXY_URL = "http://ec2-54-211-247-216.compute-1.amazonaws.com:8080";

        function getId(id) {
            return document.getElementById(id);
        }

        function callProxy(fn, params, resultId) {
            const query = Object.entries(params)
                .map(([k, v]) => `${k}=${v}`)
                .join('&');
            const xhttp = new XMLHttpRequest();
            xhttp.onload = function () {
                if (xhttp.status === 200) {
                    // Mostrar la respuesta del servidor
                    getId(resultId).innerHTML = xhttp.responseText;
                } else {
                    // Mostrar un mensaje de error si la solicitud falla
                    getId(resultId).innerHTML = "<b style='color:red;'>Error conectando al proxy</b>";
                }
            };
            xhttp.onerror = function () {
                getId(resultId).innerHTML = "<b style='color:red;'>Error conectando al proxy</b>";
            };
            xhttp.open("GET", `${PROXY_URL}/${fn}?${query}`);
            xhttp.send();
        }

        function loadPellSeq() {
            const pellNum = getId("pellnum").value;
            callProxy("pellSeq", { n: pellNum }, "pellseqrespmsg");
        }
    </script>
</body>
</html>
